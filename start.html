<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Start · Leben Pflegen Reisen</title>
<link rel="stylesheet" href="shared.css">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@800&family=Instrument+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
.box { max-width:560px; width:100%; background:#fff; border-radius:14px; padding:36px 34px; box-shadow:0 4px 24px rgba(0,0,0,.1); }
h1 { font-family:'Bricolage Grotesque',sans-serif; color:var(--green); font-size:24px; margin-bottom:18px; }
.step { padding:10px 14px; background:var(--lime-soft); border-radius:8px; margin-bottom:8px; font-size:14px; }
.step.ok::before { content:'✓ '; color:var(--ok); font-weight:700; }
.step.err { background:#FCE4DA; color:var(--warn); }
.step.err::before { content:'✗ '; font-weight:700; }
.btn-row { display:flex; gap:10px; margin-top:22px; flex-wrap:wrap; }
</style>
</head>
<body>

<div class="box">
  <h1>🚀 Schnellstart — alle Demo-Daten laden</h1>
  <p style="color:var(--muted); margin-bottom:20px; font-size:14px;">
    Dieser Knopf macht alles in einem Rutsch: löscht alte Daten, legt Demo-User an, lädt Verfügbarkeiten und Buchungen.
  </p>

  <div id="steps"></div>

  <div class="btn-row">
    <button id="btn-reset" class="btn btn-primary" style="flex:1;">🔄 Zurücksetzen &amp; Demo-Daten laden</button>
  </div>

  <hr style="margin:28px 0; border:none; border-top:1px solid var(--border);">

  <p style="font-size:13px; color:var(--muted); margin-bottom:14px;">
    <strong>Demo-Zugänge</strong> (Passwort immer <code style="background:#eee; padding:1px 5px; border-radius:3px;">demo1234</code>):
  </p>
  <div class="btn-row">
    <button class="btn btn-ghost" onclick="loginAs('margarete@demo.de')" style="flex:1;">margarete (Ehrenamt)</button>
    <button class="btn btn-ghost" onclick="loginAs('charite@demo.de')" style="flex:1;">charite (Klinik)</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-ghost" onclick="loginAs('vorstand@demo.de')" style="flex:1;">vorstand (Admin)</button>
    <a href="login.html" class="btn btn-ghost" style="flex:1;">Normaler Login</a>
  </div>

  <hr style="margin:28px 0; border:none; border-top:1px solid var(--border);">
  <div class="btn-row">
    <a href="index.html" class="btn btn-ghost" style="flex:1;">← Zur Startseite</a>
    <a href="demo.html" class="btn btn-ghost" style="flex:1;">Demo-Detailseite</a>
  </div>
</div>

<script src="app.js"></script>
<script>
const steps = document.getElementById('steps');
function step(msg, type='ok') {
  const el = document.createElement('div');
  el.className = 'step ' + type;
  el.textContent = msg;
  steps.appendChild(el);
}

document.getElementById('btn-reset').onclick = async () => {
  steps.innerHTML = '';
  try {
    step('Alten Storage löschen...');
    localStorage.clear();

    step('Demo-User anlegen (mit Passwörtern)...');
    await LPR.seedDemoUsers();
    const users = LPR.load(LPR.KEYS.users, {});
    step(`${Object.keys(users).length} User angelegt`);

    step('Demo-Verfügbarkeiten, Buchungen, Reisen laden...');
    // loadDemoData mit confirm mocken
    const origConfirm = window.confirm;
    window.confirm = () => true;
    // auch location.reload neutralisieren damit wir weitermachen können
    const origReload = window.location.reload;
    window.location.reload = () => {};
    await LPR.loadDemoData();
    window.confirm = origConfirm;

    step('Fertig! Klicke unten auf einen Demo-User, um einzuloggen.');
  } catch (e) {
    step('Fehler: ' + e.message, 'err');
    console.error(e);
  }
};

async function loginAs(email) {
  const res = await LPR.loginWithPassword({ email, password: 'demo1234' });
  if (!res.ok) {
    step('Login fehlgeschlagen: ' + res.error + ' — erst "Zurücksetzen" klicken!', 'err');
    return;
  }
  const target = res.user.role === 'klinik' ? 'kliniken.html' : 'mein-bereich.html';
  window.location.href = target;
}
</script>
</body>
</html>
